<script>
    let chances = 3; // 3 mauke milenge
    const prizes = ["5% OFF", "FREE COKE", "20% OFF", "FREE COFFEE", "50% OFF", "10% OFF", "FREE FRIES", "15% OFF"];

    function spinNow() {
        if(chances <= 0) return;
        
        document.getElementById('spinBtn').disabled = true;
        chances--;
        document.getElementById('chanceCount').innerText = chances;

        const rounds = 8 + Math.floor(Math.random() * 5);
        const extraDeg = Math.floor(Math.random() * 360);
        rotation += (rounds * 360) + extraDeg;
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            const actualDeg = rotation % 360;
            const prizeIdx = prizes.length - 1 - Math.floor(((actualDeg + 90) % 360) / (360 / prizes.length));
            const currentWin = prizes[prizeIdx < 0 ? 0 : prizeIdx];

            if(chances > 0) {
                // Agar chances bache hain toh pucho "Accept" ya "Retry"
                alert("You won: " + currentWin + "\nRemaining Chances: " + chances + "\nSpin again for a better reward?");
                document.getElementById('spinBtn').disabled = false;
            } else {
                // Final Result
                showFinalScreen(currentWin);
            }
        }, 5200);
    }
</script>
