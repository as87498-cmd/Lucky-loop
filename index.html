<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luck Loop: Big Win</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #FFD700; font-family: sans-serif; text-align: center; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: fixed; top:0; left:0; }
        .visible { display: flex !important; }
        .box { border: 2px solid #FFD700; padding: 20px; border-radius: 20px; width: 85%; background: #111; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #FFD700; background: #000; color: #fff; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(#FFD700, #b8860b); color: #000; font-weight: bold; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; }
        
        #wheel-container { position: relative; width: 320px; height: 320px; margin: 20px auto; }
        #canvas { width: 320px; height: 320px; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        #pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 35px solid #00f2ff; z-index: 10; filter: drop-shadow(0 0 5px #00f2ff);
        }
        .ad-img { width: 95%; border: 2px solid #FFD700; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="s1" class="screen visible">
        <div class="box">
            <h1 style="margin:0; font-size:30px;">LUCK LOOP</h1>
            <p style="color:cyan;">SPIN FOR 5% TO 50% DISCOUNT!</p>
            <input type="text" id="p_name" placeholder="APNA NAAM">
            <input type="tel" id="p_mob" placeholder="MOBILE NUMBER">
            <button class="btn" onclick="goToWheel()">CHECK YOUR LUCK</button>
        </div>
    </div>

    <div id="s2" class="screen">
        <h2 style="margin:0;">GOOD LUCK! 🎡</h2>
        <div id="wheel-container">
            <div id="pointer"></div>
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        <button id="spinBtn" class="btn" onclick="spinNow()" style="width:180px;">SPIN WHEEL</button>
    </div>

    <div id="s3" class="screen">
        <div class="box">
            <img src="00d36208-3e40-4401-bb90-a76b38fa74cf.png" class="ad-img" onerror="this.style.display='none'">
            <h2 id="resH" style="color:white; margin:10px 0;">YOU WON!</h2>
            <h1 id="prizeTxt" style="color:#FFD700; font-size:40px; margin:0;">---</h1>
            <p style="color:#00f2ff;">Show this screen at the counter!</p>
            <button class="btn" onclick="location.reload()" style="margin-top:20px;">DONE</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    // High Value Prize List
    const prizes = ["5% OFF", "FREE COKE", "20% OFF", "COLD COFFEE", "50% OFF", "10% OFF", "FREE FRIES", "15% OFF"];
    const colors = ["#000", "#FFD700", "#000", "#FFD700", "#000", "#FFD700", "#000", "#FFD700"];
    
    let rotation = 0;
    let pName = "";

    function draw() {
        const arc = (2 * Math.PI) / prizes.length;
        ctx.clearRect(0,0,400,400);
        for (let i = 0; i < prizes.length; i++) {
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, i * arc, (i + 1) * arc);
            ctx.fill();
            ctx.strokeStyle = "#444"; ctx.lineWidth=2; ctx.stroke();
            
            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(i * arc + arc / 2);
            ctx.fillStyle = (colors[i] === "#000") ? "#FFD700" : "#000";
            ctx.font = "bold 18px sans-serif";
            ctx.textAlign = "right";
            ctx.fillText(prizes[i], 180, 10);
            ctx.restore();
        }
    }
    draw();

    function goToWheel() {
        pName = document.getElementById('p_name').value;
        if(pName && document.getElementById('p_mob').value.length >= 10) {
            document.getElementById('s1').classList.remove('visible');
            document.getElementById('s2').classList.add('visible');
        } else { alert("Naam aur Mobile sahi dalo!"); }
    }

    function spinNow() {
        document.getElementById('spinBtn').disabled = true;
        const rounds = 8 + Math.floor(Math.random() * 5); // 8-13 full rounds
        const extraDeg = Math.floor(Math.random() * 360);
        rotation += (rounds * 360) + extraDeg;
        
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            showWinner();
        }, 5200);
    }

    function showWinner() {
        document.getElementById('s2').classList.remove('visible');
        document.getElementById('s3').classList.add('visible');
        
        const actualDeg = rotation % 360;
        // Logic to calculate prize based on clockwise rotation and pointer at top
        const prizeIdx = prizes.length - 1 - Math.floor(((actualDeg + 90) % 360) / (360 / prizes.length));
        const finalPrize = prizes[prizeIdx < 0 ? 0 : prizeIdx];
        
        document.getElementById('prizeTxt').innerText = finalPrize;
        document.getElementById('resH').innerText = pName + ", CONGRATS!";
    }
</script>
</body>
</html>
